server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://10.16.107.206:3306/aipetbrain?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8
    username: root
    password: yGSmBs3c

  redis:
    host: localhost
    port: 6379
    password:

# 生产环境应用配置
app:
  # 分享链接的基础 URL（生产环境使用实际域名）
  share-base-url: https://app.aipetbrain.com/api

# Hugging Face AI配置
huggingface:
  # API Token（在 https://huggingface.co/settings/tokens 生成）
  api-token: ${HUGGINGFACE_API_TOKEN:hf_placeholder}
  # 是否启用真实AI（false=使用模拟数据，true=调用HuggingFace API）
  enabled: true
  # 模型配置 - 使用稳定可靠的模型
  pet-model: google/vit-base-patch16-224
  object-model: facebook/detr-resnet50

# 微信小程序配置
wechat:
  # 小程序AppID（在微信小程序后台获取）
  appid: ${WECHAT_APPID:wx_placeholder}
  # 小程序AppSecret（在微信小程序后台获取）
  secret: ${WECHAT_SECRET:secret_placeholder}

# JWT配置
jwt:
  secret: aipetbrain-secret-key-2024-very-long-and-secure
  expiration: 2592000  # 30天

# 文件上传配置 - 使用腾讯云 COS
file:
  upload-path: /app/uploads/
  base-url: https://app.aipetbrain.com/api/files/
  storage-type: cos  # cos 或 local

# 腾讯云 COS 配置
cos:
  enabled: true
  region: ${COS_REGION:ap-shanghai}
  bucket: ${COS_BUCKET:placeholder}
  secret-id: ${COS_SECRET_ID:placeholder}
  secret-key: ${COS_SECRET_KEY:placeholder}
  cdn-url: ${COS_CDN_URL:}

