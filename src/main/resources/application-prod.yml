server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://your-prod-host:3306/aipetbrain?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  redis:
    host: ${REDIS_HOST}
    port: 6379
    password: ${REDIS_PASSWORD}

# 生产环境应用配置
app:
  # 分享链接的基础 URL（生产环境使用实际域名）
  share-base-url: https://app.aipetbrain.com/api

